<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Subtle Leopard - One Precise Strike</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" defer></script>
    <script src="./script.js?v=20260702-stock-chart" defer></script>
  </head>
  <body>
    <header class="hero">
      <div class="hero__image" aria-hidden="true"></div>
      <div class="hero__content">
        <div class="brand">
          <img class="brand__logo" src="./leopard.jpg" alt="The Subtle Leopard 로고" />
          <div>
            <p class="brand__eyebrow">Korean Equity Analyzer</p>
            <h1>The Subtle Leopard</h1>
            <p class="brand__tagline">One Precise Strike</p>
          </div>
        </div>
        <form id="searchForm" class="search-panel">
          <button id="refreshCorpListButton" class="refresh-corp-button" type="button">종목명 업데이트</button>
          <div class="field field--name">
            <label for="companySearchInput">종목명</label>
            <div class="autocomplete">
              <input id="companySearchInput" type="text" value="대상" placeholder="예: 코오롱" autocomplete="off" aria-autocomplete="list" aria-expanded="false" />
              <div id="companySuggestions" class="suggestions" role="listbox"></div>
            </div>
          </div>
          <label class="field field--stock">
            <span>종목코드</span>
            <input id="stockCodeInput" type="text" inputmode="numeric" maxlength="6" value="001680" placeholder="자동입력" readonly />
          </label>
          <label class="field field--select">
            <span>재무제표 구분</span>
            <select id="fsModeInput">
              <option value="AUTO">자동</option>
              <option value="CFS">연결</option>
              <option value="OFS">개별</option>
            </select>
          </label>
          <button id="searchButton" class="search-button" type="submit">조회</button>
        </form>
      </div>
    </header>

    <main class="workspace">
      <section class="ticker-strip" aria-label="종목 요약">
        <div class="ticker-cell ticker-cell--label">종목명</div>
        <div id="companyName" class="ticker-cell ticker-cell--value">대상</div>
        <div class="ticker-cell ticker-cell--label">종목코드</div>
        <div id="companyCode" class="ticker-cell ticker-cell--code">001680</div>
        <div id="statusText" class="ticker-cell ticker-cell--status">종목명을 입력한 뒤 조회하세요.</div>
      </section>

      <section class="sheet-section">
        <div class="section-bar">
          <h2>재무상태표</h2>
          <span id="unitLabel">단위: 억원</span>
        </div>
        <div class="table-wrap">
          <table id="financialTable" class="financial-table">
            <thead>
              <tr>
                <th>항목</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th>매출액</th>
              </tr>
              <tr>
                <th>증가율(YoY)</th>
              </tr>
              <tr>
                <th>영업이익</th>
              </tr>
              <tr>
                <th>증가율(YoY)</th>
              </tr>
              <tr>
                <th>지배주주순이익</th>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="chart-section">
        <div class="section-bar section-bar--chart">
          <h2>분기별 콤보 차트</h2>
          <span>영업이익 막대 / 매출액, 지배주주순이익 꺾은선</span>
        </div>
        <div class="chart-frame">
          <canvas id="financialChart"></canvas>
        </div>
      </section>

      <section class="stock-chart-section">
        <div class="section-bar section-bar--chart">
          <h2>주가 차트</h2>
          <span id="stockChartCaption">대상 001680</span>
        </div>
        <div class="stock-chart-panel">
          <div class="stock-chart-toolbar" aria-label="주가 차트 기간 선택">
            <span id="stockChartModeLabel">candle_day</span>
            <div class="stock-chart-buttons">
              <button class="stock-chart-button is-active" type="button" data-chart="candle" data-time="day">일봉</button>
              <button class="stock-chart-button" type="button" data-chart="candle" data-time="week">주봉</button>
              <button class="stock-chart-button" type="button" data-chart="candle" data-time="month">월봉</button>
              <button class="stock-chart-button" type="button" data-chart="area" data-time="day">1일</button>
              <button class="stock-chart-button" type="button" data-chart="area" data-time="week">1주일</button>
              <button class="stock-chart-button" type="button" data-chart="area" data-time="month3">3개월</button>
              <button class="stock-chart-button" type="button" data-chart="area" data-time="year">1년</button>
              <button class="stock-chart-button" type="button" data-chart="area" data-time="year3">3년</button>
              <button class="stock-chart-button" type="button" data-chart="area" data-time="year5">5년</button>
              <button class="stock-chart-button" type="button" data-chart="area" data-time="year10">10년</button>
            </div>
          </div>
          <div class="stock-chart-frame">
            <img id="stockChartImage" src="https://ssl.pstatic.net/imgfinance/chart/item/candle/day/001680.png" alt="대상 주가 차트" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
